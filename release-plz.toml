# release-plz — the RELEASE half of the pipeline only (config docs:
# https://release-plz.dev/docs/config).
#
# Division of labor (open-recorder's model):
#   * The "release PR" (version bump + Cargo.lock + CHANGELOG) is produced by
#     OUR OWN `release-pr` job in .github/workflows/release.yml (patch line;
#     deliberate minor/major via manual-version-bump.yml). It is NOT
#     `release-plz release-pr`: that command's git-only change detection runs
#     `cargo package`, which requires every internal path dependency
#     (ov-core, ov-audio, ...) to resolve from crates.io — and these crates
#     are intentionally unpublished (upstream release-plz#2651-adjacent).
#   * `release-plz release` (this config) runs on every master push: with
#     `release_always = true` it sees an untagged workspace version and cuts
#     the `vX.Y.Z` tag + GitHub Release from CHANGELOG.md. It never packages,
#     so the unpublished path deps are irrelevant here.
#
# Every crate shares ONE version via `version.workspace = true` (root
# Cargo.toml `[workspace.package] version`); `ov-cli` (the `openvoice` binary)
# is the single release unit that emits the tag + Release.
#
# NOTE: do NOT set `publish = false` in ov-cli's Cargo manifest — release-plz
# skips manifest-unpublishable packages' git releases entirely ("nothing to
# release"; learned cutting v0.1.0, same lesson as open-recorder's v0.4.0).
# The publish guard is the release-plz `publish = false` below.
#
# Nothing is published to crates.io: delivery is the GitHub Release (prebuilt
# `openvoice` binaries for Linux/macOS/Windows) and the grok-insider cachix
# cache — `flake.nix` reads the same version from Cargo.toml.

[workspace]
# Not on crates.io: determine the current version from the `v*` git tag instead
# of the cargo registry, and never run `cargo publish`. (Set at BOTH the
# workspace and the ov-cli package level — release-plz #2693: workspace-level
# values don't always propagate to packages.)
git_only = true
publish = false
# Release whenever master has an un-tagged version (robust after failed runs
# or manual fixes, not only on the exact release-PR-merge commit).
release_always = true
# Application binaries + internal libraries, not a published API surface.
semver_check = false
# Auto stream stays on patch: feat: does not force minor.
features_always_increment_minor = false
# Opt-in model: don't process any crate by default. `ov-cli` opts in below; the
# other crates ride the shared workspace version with no tag/release of their
# own.
release = false
pr_labels = ["release"]

[[package]]
name = "ov-cli"
release = true
git_only = true
publish = false
# One workspace-wide tag + release name, e.g. `v0.2.0`.
git_tag_name = "v{{ version }}"
git_release_name = "v{{ version }}"
git_release_enable = true
git_tag_enable = true
changelog_path = "CHANGELOG.md"
# `ov-cli` is the composition root that (transitively) depends on every other
# crate, so a change anywhere ships inside the release. Fold all members'
# commits into ov-cli's version bump + changelog.
changelog_include = [
    "ov-core",
    "ov-audio",
    "ov-output",
    "ov-config",
    "ov-local",
    "ov-providers",
    "ov-engine",
]

# Preserve the curated changelog header (release-plz inserts new sections below).
[changelog]
header = """# Changelog

All notable, user-facing changes to open-voice are documented here. The format
follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/) and this
project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).
"""
