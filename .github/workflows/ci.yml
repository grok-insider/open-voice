name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast, required gate: formatting, lints, and the hermetic test suite.
  # ffmpeg is installed for the ov-audio decode tests (they skip gracefully
  # when it's absent, but running them is the point).
  rust:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  # The `local` (ONNX/Canary) feature is excluded from the default build; make
  # sure it keeps compiling. ort-sys' own binary download (cdn.pyke.io) 403s
  # from GitHub-hosted runner IPs, so we feed it a system ONNX Runtime from
  # Microsoft's GitHub releases via ORT_LIB_LOCATION instead — deterministic,
  # no pyke CDN involved. Keep the version in sync with what ort-sys expects
  # (the `ms@X.Y.Z` component of its download URL).
  local-feature:
    name: check --features local
    runs-on: ubuntu-latest
    env:
      ONNXRUNTIME_VERSION: 1.24.2
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: local-feature
      - name: Install ONNX Runtime (system strategy for ort-sys)
        run: |
          set -euo pipefail
          curl -fsSL --retry 5 -o /tmp/onnxruntime.tgz \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ONNXRUNTIME_VERSION}/onnxruntime-linux-x64-${ONNXRUNTIME_VERSION}.tgz"
          mkdir -p "$HOME/onnxruntime"
          tar xzf /tmp/onnxruntime.tgz -C "$HOME/onnxruntime" --strip-components=1
          echo "ORT_LIB_LOCATION=$HOME/onnxruntime/lib" >> "$GITHUB_ENV"
          # The Microsoft tarball ships shared libraries only; ort-sys
          # defaults to static linking for system libs and fails without this.
          echo "ORT_PREFER_DYNAMIC_LINK=1" >> "$GITHUB_ENV"
      - run: cargo clippy -p ov-cli --features local --all-targets -- -D warnings

  # On master pushes (plus tags + manual dispatch): build with Nix and push
  # every store path to the grok-insider cachix cache, so NixOS consumers
  # pointing at github:grok-insider/open-voice pull instead of compiling.
  # PRs never publish (no secrets on fork PRs).
  build:
    name: nix build + cachix push (${{ matrix.system }})
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            system: x86_64-linux
          - runner: ubuntu-24.04-arm
            system: aarch64-linux
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Set up Cachix
        uses: cachix/cachix-action@v15
        with:
          name: grok-insider
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          extraPullNames: nix-community

      - name: Build open-voice
        run: nix build .#packages.${{ matrix.system }}.default -L

      - name: Flake check
        run: nix flake check -L
